apiVersion: apps/v1
kind: Deployment
metadata:
  name: face-matching-signin
  namespace: default
  labels:
    app: face-matching
    worker: signin
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: face-matching
      worker: signin
  template:
    metadata:
      labels:
        app: face-matching
        worker: signin
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: face-matching-signin
          image: us-central1-docker.pkg.dev/banking-ekyc-487718/face-matching/face-matching:latest
          command: ["python", "-m", "app.main", "worker-signin"]
          env:
            - name: CONFIG_PATH
              value: "/app/secrets/config.yaml"
            - name: FIREBASE_CREDENTIALS_PATH
              value: "/app/secrets/firebase_credentials.json"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/app/secrets/firebase_credentials.json"
            - name: PUBSUB_SIGNIN_SUBSCRIPTION
              value: "banking-ekyc-sign-in-sub"
            - name: TF_CPP_MIN_LOG_LEVEL
              value: "2"
            - name: TF_ENABLE_ONEDNN_OPTS
              value: "0"
            - name: CUDA_VISIBLE_DEVICES
              value: ""
            - name: PUBSUB_MAX_MESSAGES
              value: "20"
            - name: DOWNLOAD_WORKERS
              value: "6"
            - name: EMBEDDING_WORKERS
              value: "2"
            - name: EMBEDDING_ENFORCE_DETECTION
              value: "false"
            - name: SIGNIN_USE_DB_EMBEDDINGS
              value: "true"
            - name: SIGNIN_ALLOW_ON_DEMAND_REGISTERED_EMBEDDINGS
              value: "false"
            - name: SIGNIN_MAX_LOGIN_IMAGES
              value: "3"
            - name: SIGNIN_DISTANCE_THRESHOLD
              value: "0.68"
            - name: SIGNIN_PERSONALIZATION_ENABLED
              value: "true"
            - name: SIGNIN_PERSONALIZATION_MAX_EMBEDDINGS
              value: "5"
            - name: SIGNIN_UPDATE_LOGIN_EMBEDDING
              value: "true"
            - name: EMBEDDING_WARMUP
              value: "true"
          volumeMounts:
            - name: secrets-volume
              mountPath: /app/secrets
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
      volumes:
        - name: secrets-volume
          secret:
            secretName: face-matching-secrets
            items:
              - key: config.yaml
                path: config.yaml
              - key: firebase_credentials.json
                path: firebase_credentials.json
